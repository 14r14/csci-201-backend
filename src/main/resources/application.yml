spring:
  application:
    name: csci201-backend

  # Default: MySQL (persistent — visible in DBeaver, MySQL Workbench, etc.)
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:csci201}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:flyway/mysql

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Optional: in-memory H2 (e.g. mvn test without MySQL). Activate with SPRING_PROFILES_ACTIVE=h2
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    locations: classpath:flyway/h2
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
